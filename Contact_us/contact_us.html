<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴버대 티어표</title>
  <link rel="stylesheet" href="contact_us.css">

<!-- ==================== 문의사항 본문 ==================== -->

    <h1 class="page-title"><img src="/tier-image/HBU_Contact_Image.png" alt="로고" class="logo-img"> 문의사항</h1>
    <p class="desc">
      파벨 관련 문제로 인한 티어 변동 문의나<br>

    <!-- 로그인 상태에 따라 동적으로 바뀌는 영역 -->

    <!-- 댓글 목록 (로그인 여부와 상관없이 항상 표시) -->

  <div id="footer-placeholder"></div>
  
  <script src="contact_us.js"></script>
