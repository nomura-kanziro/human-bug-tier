<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴버대 티어표</title>
  <link rel="stylesheet" href="common-v2.css">
  <link rel="stylesheet" href="../Header_Footer.css">
  
</head>
<body>
  <!-- 상단 네비게이션 -->
  <div id="header-placeholder"></div>

  <!-- ✅ 문의사항 본문 -->
  <section class="contact">
    
    <h2>문의사항</h2>
    <p class="desc">
    파벨 관련 문제로 인한 티어 변동 문의나<br />
    사이트 내 버그/오류 관련 제보를 남겨주세요.
    </p>


    <div class="form-box">
      <div class="row">
        <input type="text" id="name" placeholder="이름 (선택)" />
        <input type="email" id="email" placeholder="이메일 (선택)" />
      </div>
      <textarea id="message" placeholder="댓글을 입력하세요."></textarea>
      <button id="submitBtn">등록</button>
    </div>


    <div class="comment-list" id="commentList"></div>
  </section>
  <div class="admin-bar">
    <button id="loginBtn" onclick="goAdminLogin()">관리자 로그인</button>
    <button id="logoutBtn" onclick="adminLogout()">로그아웃</button>
  </div>

  <!-- 하단 -->
  <div id="footer-placeholder"></div>
  
  <script src="common-v2.js"></script>
  <script src="../common.js"></script>
</body>
</html>
