<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 - 휴버대 티어표</title>
  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="notice.css">
  <link rel="stylesheet" href="../Header_Footer.css">
</head>

  <div class="notice-page">

          전체 공지
        </h2>
        <div id="notice-list-general" class="notice-list"></div>

      </div>

      <div class="notice-col notice-col-news">
        <h2 class="notice-col-title">
          <span class="notice-dot" style="background:#8b5cf6;"></span>
          새 소식
        </h2>
        <div id="notice-list-news" class="notice-list"></div>
        <a href="news.html" id="notice-count-news" class="notice-more">문서 모두 보기 →</a>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="../site_config.js"></script>
  <script src="../api_config.js"></script>
  <script src="../common.js"></script>
  <script src="notice.js"></script>
