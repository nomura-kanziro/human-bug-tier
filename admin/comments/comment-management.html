<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>댓글 관리 - Admin</title>
    
    <link rel="stylesheet" href="../../Header_Footer.css">
    <link rel="stylesheet" href="comment-management.css">
</head>
<body style="background-color: #ffffff;">

    <div id="header-placeholder"></div>

    <main class="admin-main">
        <h1 class="page-title">📋 전체 댓글 관리</h1>

        <div class="filter-nav">
          <div class="filter-left">
            <span class="filter-title">댓글 탐색 기능</span>
            <button onclick="setTypeFilter('all')"     id="filter-all"     class="filter-btn active">전체 댓글</button>
            <button onclick="setTypeFilter('user')"    id="filter-user"    class="filter-btn">일반유저 댓글</button>
            <button onclick="setTypeFilter('admin')"   id="filter-admin"   class="filter-btn">관리자 댓글</button>
            <button onclick="setTypeFilter('reported')" id="filter-reported" class="filter-btn">신고한 댓글</button>

            <select id="sort-select" onchange="applyFilters()" class="filter-select">
              <option value="newest">최신순</option>
              <option value="oldest">오래된순</option>
            </select>
          </div>
      
            <div class="filter-right">
              <div class="search-group">
                <input type="text" id="search-input" placeholder="작성자ID 또는 내용 검색..." 
                       onkeyup="if(event.key==='Enter') applyFilters()">
              
                <button onclick="applyFilters()" class="search-btn">
                  🔍 검색
                </button>
              </div>
        
              <select id="report-filter" onchange="applyFilters()" class="filter-select">
                <option value="">없음</option>
                <option value="도배 및 테러행위">도배 및 테러행위</option>
                <option value="비방 및 모욕행위">비방 및 모욕행위</option>
                <option value="광고형 댓글">광고형 댓글</option>
                <option value="기타">기타</option>
              </select>
            </div>
        </div>
        
        <div class="control-bar">
            <button id="delete-all-btn" class="danger-btn">🗑️ 모든 댓글 삭제</button>
        </div>

        <table id="comment-table" class="admin-table">
            <thead>
                <tr>
                    <th>No</th>
                    <th>작성자 ID</th>
                    <th>이메일</th>
                    <th>댓글 내용</th>
                    <th>작성일</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div id="pagination" class="pagination"></div>

        <!-- ==================== 차단 관리 섹션 ==================== -->
        <section class="block-section">
            <h2 class="page-title section-title">🚫 사용자 / IP 차단 관리</h2>

            <div class="filter-nav block-filter-nav">
              <div class="filter-left block-filter-left">
                <span class="filter-title">차단 추가</span>
                <input type="text" id="block-input" class="block-text-input" placeholder="차단할 ID 또는 IP 입력">
                <select id="block-duration-select" class="filter-select block-duration-select">
                  <option value="1">1일</option>
                  <option value="3">3일</option>
                  <option value="7">7일</option>
                  <option value="14">14일</option>
                  <option value="30">30일</option>
                  <option value="90">90일</option>
                  <option value="custom">관리자 지정</option>
                </select>
                <input type="number" id="block-custom-days" class="block-custom-days" min="1" max="9999" placeholder="일수 (최대 9999)">
                <button id="add-block-btn" class="block-add-btn">🚫 차단 추가</button>
              </div>
            </div>

            <h3 class="subsection-title">👥 등록된 사용자 (회원가입)</h3>
            <table id="user-table" class="admin-table block-table">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>닉네임</th>
                        <th>이메일</th>
                        <th>인증</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="user-list"></tbody>
            </table>

            <h3 class="subsection-title">🚫 차단 목록</h3>
            <table id="block-table" class="admin-table block-table">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>대상</th>
                        <th>유형</th>
                        <th>차단 기간</th>
                        <th>차단일</th>
                        <th>만료일</th>
                        <th>남은 기간</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="block-list"></tbody>
            </table>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../common.js"></script>
    <script src="comment-management.js"></script>

    <script>
        function checkAdminAuth() {
            if (localStorage.getItem("isAdmin") !== "true") {
                alert("❌ 관리자 로그인이 필요합니다.");
                window.location.href = "../admin-login.html";
                return false;
            }
            return true;
        }
    
        window.addEventListener('load', checkAdminAuth);

        window.addEventListener('load', () => {
            if (typeof loadCommon === 'function') {
                loadCommon();
            }

            setTimeout(() => {
                if (typeof initAdminData === 'function') {
                    initAdminData();
                }
            }, 700);
        });
    </script>
</body>
</html>
