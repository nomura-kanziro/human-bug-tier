<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>댓글 상세 관리 - 휴버대 티어표</title>
  <link rel="stylesheet" href="comment-management.css">
  <link rel="stylesheet" href="../../Header_Footer.css">
  <style>
    .detail-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .detail-card {
      background: #fff;
      border: 4px solid #111;
      border-radius: 12px;
      box-shadow: 8px 8px 0 #111;
      padding: 30px;
      margin-bottom: 30px;
    }
    .answer-card {
      margin-top: 25px;
      padding: 22px;
      border: 3px solid #111;
      border-radius: 12px;
      background: #fafafa;
      box-shadow: 6px 6px 0 #111;
    }
    .quote {
      background: #f0f0f0;
      border: 3px solid #666;
      border-radius: 8px;
      padding: 16px;
      margin: 18px 0;
      font-size: 15px;
      line-height: 1.6;
    }
    .action-buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="detail-container">
    <h1 style="font-size: 28px; font-weight: 900; padding-bottom: 12px;">
      📋 댓글 상세 관리
    </h1>

    <div id="comment-detail"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../../site_config.js"></script>
  <script src="../../api_config.js"></script>
  <script src="../../common.js"></script>
  <script src="../admin_api.js"></script>
  <script src="comment-detail.js"></script>
</body>
</html>
