services:
  - type: web
    name: human-bug-tier
    env: node
    # backend 폴더를 루트로 설정 (추천)
    # frontend 정적 파일은 backend/server.js에서 __dirname 기준 상위로 서빙함
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ADMIN_INPUT_ID
        sync: false
      - key: ADMIN_INPUT_PW
        sync: false
      - key: JWT_SECRET
        sync: false
        generateValue: true
      # 비밀번호 찾기·가입 인증 메일용 (Gmail 앱 비밀번호). 미설정 시 찾기 API는 503.
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      # 메일 본문 절대 링크 (Render 공개 URL). 미설정 시 요청 Host로 생성.
      - key: APP_URL
        sync: false
