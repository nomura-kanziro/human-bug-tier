<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>비밀번호 재설정</title>
  <link rel="stylesheet" href="find_account.css" />
</head>
<body>
  <div class="logo" onclick="location.href='../index.html'">
    <img src="../tier-image/logo.webp" alt="로고" class="logo-img">
    휴버대 티어표
  </div>

  <div class="login-wrapper">
    <div class="login-box">
      <h2 style="color:#000;">비밀번호 재설정</h2>
      <p id="reset-status" style="display:none; margin:0 0 12px; font-size:14px; line-height:1.5;"></p>
      <input type="password" id="newPassword" placeholder="새 비밀번호" />
      <input type="password" id="confirmPassword" placeholder="새 비밀번호 확인" />
      <button id="reset-btn" type="button" style="width:240px; margin-top:15px;">비밀번호 변경</button>
      <p style="margin-top:16px;"><a href="login.html">로그인으로 돌아가기</a></p>
    </div>
  </div>

  <script src="auth_api.js"></script>
  <script src="reset_password.js"></script>
  <script src="../pwa-register.js"></script>
</body>
</html>
