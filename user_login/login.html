<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>로그인</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="logo" onclick="goHome()">
      <img src="../tier-image/logo.webp" alt="로고" class="logo-img">
      휴버대 티어표
  </div>

  <div class="login-wrapper">
    <!-- 왼쪽 로그인 영역 -->
    <div class="login-box">
      <h2 style="color:#000;">로그인</h2>

      <input type="text" id="userId" placeholder="아이디" />
      <input type="password" id="userPw" placeholder="비밀번호" />
      
      <!-- 로그인 / 회원가입 두 갈래 버튼 -->
      <div class="button-row">
        <button onclick="login()" class="btn-primary">로그인</button>
        <button onclick="goToSignup()" class="btn-secondary">회원가입</button>
      </div>

      <!-- 아이디 및 비밀번호 찾기 -->
      <div class="find-btn" onclick="findAccount()">아이디 및 비밀번호 찾기</div>

      <!-- 돌아가기 -->
      <div class="back-btn" onclick="goBack()">⟳</div>
    </div>

    <!-- 오른쪽 컬러 영역 -->
    <div class="side-panel"></div>
  </div>

  <script src="auth_api.js"></script>
  <script src="login.js"></script>
  <script src="../pwa-register.js"></script>
</body>
</html>
