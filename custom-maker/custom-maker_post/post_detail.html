<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커스텀 티어 상세 - Human Bug Tier</title>
  <link rel="icon" href="../../tier-image/logo.webp" type="image/webp">

  <link rel="stylesheet" href="../../common.css">
  <link rel="stylesheet" href="../../Header_Footer.css">
  <link rel="stylesheet" href="../custom-maker.css">
  <link rel="stylesheet" href="custom-maker_post.css">
  <link rel="stylesheet" href="post_detail.css">
</head>
<body data-page="post-detail">
  <div id="header-placeholder"></div>

  <main class="post-detail-container">

    <div class="post-header">
      <div class="post-author-profile">
        <img src="../../tier-image/logo.webp" alt="프로필" class="profile-img" id="profile-img">
        <span class="author-name" id="author-name">작성자</span>
      </div>

      <div class="post-meta-row">
        <div class="post-left">
          <button class="user-posts-btn" onclick="goToUserPosts()">유저관련 게시글 보기</button>
          <span class="post-date" id="post-date">-</span>
        </div>
        <div class="post-right">
          <span class="stat">조회 <strong id="post-views">0</strong></span>
          <span class="stat">추천 <strong id="post-likes">0</strong></span>
          <span class="stat comment-link" onclick="scrollToComments()">
            댓글 <strong id="comment-count-header">0</strong>
          </span>
        </div>
      </div>
    </div>

    <h1 class="post-title" id="post-title">게시글 제목</h1>

    <div id="tier-section">
      <div class="tier-nav">
        <button id="prev-btn">← 이전 티어</button>
        <h2 id="tier-title">1등급 - 신계 / 슈퍼 그랜드 마스터</h2>
        <button id="next-btn">다음 티어 →</button>
      </div>

      <div id="tier-list" class="tier-list"></div>
    </div>

    <div class="post-action">
      <button id="like-btn" class="action-btn like-btn">
        ❤️ 추천하기 <span id="like-count">0</span>
      </button>
      <button id="share-btn" class="action-btn">🔗 공유하기</button>
      <button id="event-btn" class="action-btn" type="button" hidden>🎉 이벤트 참여</button>
      <button id="edit-btn" class="action-btn edit-btn" type="button" hidden>✏️ 수정하기</button>
      <button id="report-post-btn" class="action-btn report-btn" type="button" hidden>🚨 신고하기</button>
      <button id="delete-btn" class="action-btn delete-btn" type="button" hidden>🗑️ 삭제하기</button>
    </div>

    <div class="comment-section">
      <h3>댓글 <span id="comment-count">(0)</span></h3>
      <p id="comment-login-hint" class="comment-login-hint" hidden>댓글을 작성하려면 로그인이 필요합니다.</p>
      <div class="comment-form" id="comment-form">
        <div id="comment-input" class="comment-input-box" contenteditable="true" data-placeholder="댓글을 입력하세요"></div>
        <button id="comment-submit-btn" type="button">등록</button>
      </div>
      <div id="comment-list" class="comment-list"></div>
    </div>

  </main>

  <div id="footer-placeholder"></div>

  <script src="../../common.js"></script>
  <script src="post_detail.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof window.initPostDetailPage === 'function') {
        window.initPostDetailPage();
      }
    });
  </script>
</body>
</html>
