<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커스텀 티어 게시판 - Human Bug Tier</title>
  <link rel="icon" href="../../tier-image/logo.webp" type="image/webp">

  <!-- 공통 CSS -->
  <link rel="stylesheet" href="custom-maker_post.css">
  <link rel="stylesheet" href="../../Header_Footer.css">
  
  <style>
    .board-container {
      max-width: 1750px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    .board-header {
      text-align: center;           /* ← 이 한 줄이 핵심 */
      margin-bottom: 30px;
    }

    .board-header h1 {
      font-size: 32px;
      color: #000000;
      margin: 0;
      font-weight: 700;
    }
    
    .eyes_icon {
      background-color: transparent #fff;
      width: 35px;
      height: 35px;
    }

    .board-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .board-controls input {
      flex: 1;
      padding: 10px;
      border: 2px solid #444;
      background: #1a1a1a;
      color: #fff;
      border-radius: 6px;
    }
    
    .board-controls button {
      padding: 10px 20px;
      background: #ffc400;
      color: #111;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    
    .board-table {
      width: 100%;
      border-collapse: collapse;
      background: #1f1f1f;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .board-table th,
    .board-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    
    .board-table th {
      background: #2a2a2a;
      color: #ffcc00;
    }
    
    .board-table tr:hover {
      background: #2a2a2a;
    }
    
    .post-title {
      color: #fff;
      text-decoration: none;
    }
    
    .post-title:hover {
      color: #ffcc00;
    }
    
  </style>
</head>
<body>
  <!-- 헤더 (반드시 이 id로 작성) -->
  <div id="header-placeholder"></div>

  <main>
    <div class="board-container">
      <div class="board-header">        
        <h1 id="board-title"><img src="..\..\tier-image\human_bug_eyes_icon.gif" class="eyes_icon"> 커스텀 티어 게시판</h1>
        <p id="board-subtitle" class="board-subtitle" hidden></p>
      </div>

      <!-- 검색 + 글쓰기 영역 -->
      <div class="board-controls">
        <input type="text" id="search-input" placeholder="제목 또는 작성자 검색">
        <button type="button" onclick="searchPosts()">검색</button>
        <button type="button" id="view-all-board-btn" onclick="goAllPosts()" hidden>전체 게시판</button>
        <button type="button" onclick="goWritePage()">직접 만들기</button>
      </div>

      <!-- 기존 더미 카드 부분을 아래로 교체 -->
      <div class="post-grid" id="post-grid"></div>
    </div>
  </main>

  <!-- 푸터 (반드시 이 id로 작성) -->
  <div id="footer-placeholder"></div>

  <!-- 공통 스크립트 + 게시판 전용 스크립트 -->
  <script src="../../site_config.js"></script>
  <script src="../../api_config.js"></script>
  <script src="../../common.js"></script>
  <script src="custom-maker_post.js"></script>
</body>
</html>
