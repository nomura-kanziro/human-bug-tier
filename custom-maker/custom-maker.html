<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커스텀 티어 메이커</title>
  <link rel="icon" href="../tier-image/logo.webp" type="image/webp">
  <link rel="stylesheet" href="../Header_Footer.css">
  <link rel="stylesheet" href="custom-maker.css">   <!-- 우리가 새로 만들 CSS -->
  <script src="../common.js"></script>
  <!-- html2canvas 라이브러리 (PNG 캡처용) -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- header/footer 자동 로드 -->
  <div id="header-placeholder"></div>

  <div class="maker-container">
    <h1><img src="..\tier-image\human_bug_eyes_icon.gif" class="eyes_icon"> 커스텀 티어 메이커</h1>
    

    <!-- tier-class 스타일 그대로 + 화살표 -->
    <div class="tier-nav">
      <button id="prev-btn">← 이전 티어</button>
      <h2 id="tier-title">1등급 - 신계 / 슈퍼 그랜드 마스터</h2>
      <button id="next-btn">다음 티어 →</button>
    </div>

    <!-- ✅ tier-nav 밖에, tier-list 중복 제거하고 여기 하나만 -->
    <div id="tier-capture-area">
      <div id="tier-list" class="tier-list"></div>
    </div>

    <!-- 설정 버튼들 -->
    <div class="action-bar">
  
      <!-- 초기화 버튼 -->
      <button id="reset-btn" class="btn btn-reset">
        <span class="btn-text">초기화</span>
        <span class="btn-icon">🗑️</span>
      </button>
    
      <!-- 다운로드 버튼 (드롭다운) -->
      <div class="btn-dropdown">
        <button id="download-btn" class="btn btn-download">
          <span class="btn-text">다운로드</span>
          <span class="btn-icon">⬇️</span>
        </button>
        
        <!-- 클릭하면 펼쳐지는 메뉴 -->
        <div class="dropdown-menu" id="download-menu">
          <button class="dropdown-item" data-type="png">PNG로 저장</button>
          <button class="dropdown-item" data-type="pdf">PDF로 저장</button>
          <button class="dropdown-item" data-type="json">JSON으로 저장</button>
        </div>
      </div>
    
      <!-- 업로드 버튼 -->
      <button id="upload-btn" class="btn btn-upload">
        <span class="btn-text">업로드</span>
        <span class="btn-icon">🔗</span>
      </button>
    
    </div>

    <!-- 아래쪽 캐릭터 목록 (드래그 가능) -->
    <div class="character-pool">
      <h3>📦 전체 캐릭터 풀 (드래그해서 위로 옮기세요)</h3>
      <div id="character-pool" class="characters-pool"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="custom-maker.js"></script>
</body>
</html>
